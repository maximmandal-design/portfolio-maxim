<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maxim Mandal | Skills</title>

    <link rel="stylesheet" href="skills.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">MM</div>
      <ul class="nav-links">
        <li><a href="index.html">About</a></li>
        <li><a href="skills.html" class="active">Skills</a></li>
        <li><a href="interests.html">Interests</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <header class="page-header">
      <h1 style="letter-spacing: 1px">My Skills</h1>
      <p>A snapshot of what I bring to every project</p>
    </header>

    <section class="section-wrapper">
      <span class="category-label">Core Web Skills</span>
      <h2 class="section-title">Technical Proficiency</h2>

      <div class="skills-grid">
        <div class="skill-card" style="border-left-color: #e34c26">
          <div class="skill-name">HTML</div>
          <div class="skill-level-label">
            <span class="chip chip-advanced">Advanced</span>
          </div>
          <div class="progress-track">
            <div
              class="progress-fill"
              style="
                width: 90%;
                background: linear-gradient(90deg, #e34c26, #f07a5a);
              "
            ></div>
          </div>
          <p
            style="
              font-size: 0.8rem;
              color: #aaa;
              margin-top: 8px;
              text-align: right;
            "
          >
            90%
          </p>
        </div>

        <div class="skill-card" style="border-left-color: #264de4">
          <div class="skill-name">CSS</div>
          <div class="skill-level-label">
            <span class="chip chip-advanced">Advanced</span>
          </div>
          <div class="progress-track">
            <div
              class="progress-fill"
              style="
                width: 85%;
                background: linear-gradient(90deg, #264de4, #6a8ff7);
              "
            ></div>
          </div>
          <p
            style="
              font-size: 0.8rem;
              color: #aaa;
              margin-top: 8px;
              text-align: right;
            "
          >
            85%
          </p>
        </div>

        <div class="skill-card" style="border-left-color: #6c63ff">
          <div class="skill-name">Responsive Design</div>
          <div class="skill-level-label">
            <span class="chip chip-intermediate">Intermediate</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: 65%"></div>
          </div>
          <p
            style="
              font-size: 0.8rem;
              color: #aaa;
              margin-top: 8px;
              text-align: right;
            "
          >
            65%
          </p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>Maxim Mandal</p>
    </footer>
  </body>
</html>
